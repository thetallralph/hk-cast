<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HK Mic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }
    h2 { font-size: 18px; margin-bottom: 10px; color: #888; }
    #status { font-size: 14px; color: #44aaff; margin: 10px 0; text-align: center; min-height: 20px; }
    #btn {
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 4px solid #333;
      background: #2a2a4e;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      margin: 20px 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #btn.ready { border-color: #00ff88; }
    #btn.listening {
      background: #ff4444;
      border-color: #ff6666;
      box-shadow: 0 0 30px rgba(255,68,68,0.4);
    }
    #btn.processing {
      background: #ffaa00;
      border-color: #ffcc44;
    }
    #btn.disabled { opacity: 0.5; }
    #level {
      width: 200px; height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
      margin: 10px 0;
    }
    #level-bar { height: 100%; width: 0%; background: #00ff88; transition: width 0.1s; }
    #transcript { font-size: 14px; color: #aaa; text-align: center; margin-top: 10px; max-width: 300px; }
    #response { font-size: 14px; color: #00ff88; text-align: center; margin-top: 10px; max-width: 300px; }
    #log { font-size: 11px; color: #555; margin-top: 20px; max-height: 100px; overflow-y: auto; text-align: center; }
    #room-id { font-family: monospace; font-size: 20px; color: #ffaa00; letter-spacing: 3px; }
  </style>
</head>
<body>
  <h2>HK Voice Assistant</h2>
  <div id="room-id"></div>
  <div id="status">Initializing...</div>

  <button id="btn" class="disabled">Loading...</button>

  <div id="level"><div id="level-bar"></div></div>
  <div id="transcript"></div>
  <div id="response"></div>
  <div id="log"></div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const btn = document.getElementById('btn');
    const statusEl = document.getElementById('status');
    const levelBar = document.getElementById('level-bar');
    const transcriptEl = document.getElementById('transcript');
    const responseEl = document.getElementById('response');
    const logEl = document.getElementById('log');
    const roomIdEl = document.getElementById('room-id');

    const ROOM_ID = location.hash.slice(1) || 'hk1000';
    roomIdEl.textContent = ROOM_ID;

    const MIC_PEER_ID = 'hk-mic-' + ROOM_ID;
    const SPEAKER_PEER_ID = 'hk-spk-' + ROOM_ID;

    let conn = null;
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let analyser = null;
    let animFrame = null;
    let micReady = false;
    let peerReady = false;

    function dbg(msg) {
      console.log(msg);
      logEl.textContent = msg + '\n' + logEl.textContent;
    }

    // === STEP 1: Setup mic immediately ===
    async function setupMic() {
      try {
        dbg('Requesting mic access...');
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true }
        });
        const ctx = new AudioContext();
        const src = ctx.createMediaStreamSource(stream);
        analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        micReady = true;
        dbg('Mic OK');
        updateButtonState();
      } catch (e) {
        dbg('Mic error: ' + e.message);
        statusEl.textContent = 'Mic access denied! Check browser permissions.';
      }
    }

    // === STEP 2: Connect PeerJS ===
    function setupPeer() {
      dbg('Connecting to PeerJS...');
      const peer = new Peer(MIC_PEER_ID, { debug: 0 });

      peer.on('open', (id) => {
        dbg('Peer open: ' + id);
        peerReady = true;
        statusEl.textContent = 'Connecting to speaker...';
        tryConnectToSpeaker(peer);
      });

      peer.on('connection', (incoming) => {
        dbg('Incoming connection from speaker');
        setupConnection(incoming);
      });

      peer.on('error', (err) => {
        dbg('Peer error: ' + err.type + ' ' + err.message);
        if (err.type === 'unavailable-id') {
          statusEl.textContent = 'Mic already open elsewhere. Close other tab.';
        } else if (err.type === 'peer-unavailable') {
          dbg('Speaker not found, retrying...');
          setTimeout(() => tryConnectToSpeaker(peer), 3000);
        }
      });

      peer.on('disconnected', () => {
        dbg('Peer disconnected, reconnecting...');
        peer.reconnect();
      });
    }

    function tryConnectToSpeaker(peer) {
      dbg('Trying to connect to speaker: ' + SPEAKER_PEER_ID);
      const c = peer.connect(SPEAKER_PEER_ID, { reliable: true });

      c.on('open', () => {
        dbg('Connected to speaker!');
        setupConnection(c);
      });

      c.on('error', (e) => {
        dbg('Connection error: ' + e);
        setTimeout(() => tryConnectToSpeaker(peer), 3000);
      });

      // Timeout fallback
      setTimeout(() => {
        if (!conn) {
          dbg('Connection timeout, retrying...');
          tryConnectToSpeaker(peer);
        }
      }, 8000);
    }

    function setupConnection(c) {
      conn = c;
      dbg('Data channel open');
      statusEl.textContent = 'Connected to speaker!';
      updateButtonState();

      conn.on('data', (data) => {
        if (data.type === 'transcript') transcriptEl.textContent = '🎤 "' + data.text + '"';
        else if (data.type === 'response') responseEl.textContent = '🔊 ' + data.text;
        else if (data.type === 'status') statusEl.textContent = data.text;
      });

      conn.on('close', () => {
        dbg('Connection closed');
        conn = null;
        statusEl.textContent = 'Disconnected. Reconnecting...';
        updateButtonState();
      });
    }

    function updateButtonState() {
      btn.classList.remove('disabled', 'ready');
      if (micReady && conn) {
        btn.classList.add('ready');
        btn.textContent = 'Hold to talk';
        statusEl.textContent = 'Ready! Hold the button and speak.';
      } else if (micReady && !conn) {
        btn.textContent = 'Waiting for speaker...';
      } else {
        btn.classList.add('disabled');
        btn.textContent = 'Setting up...';
      }
    }

    // === RECORDING ===
    function startRecording() {
      if (!micReady || !stream || !conn) {
        dbg('Cannot record: mic=' + micReady + ' conn=' + !!conn);
        return;
      }
      isRecording = true;
      audioChunks = [];
      btn.classList.remove('ready');
      btn.classList.add('listening');
      btn.textContent = 'Listening...';
      transcriptEl.textContent = '';
      responseEl.textContent = '';

      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      mediaRecorder.onstop = sendAudio;
      mediaRecorder.start(100);
      updateLevel();
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      btn.classList.remove('listening');
      btn.classList.add('processing');
      btn.textContent = 'Processing...';
      cancelAnimationFrame(animFrame);
      levelBar.style.width = '0%';
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    }

    function updateLevel() {
      if (!analyser || !isRecording) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      levelBar.style.width = Math.min(100, avg * 1.5) + '%';
      animFrame = requestAnimationFrame(updateLevel);
    }

    async function sendAudio() {
      const blob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
      dbg('Audio size: ' + blob.size + ' bytes');

      if (blob.size < 1000) {
        dbg('Audio too short, ignoring');
        btn.classList.remove('processing');
        updateButtonState();
        return;
      }

      const buffer = await blob.arrayBuffer();
      const base64 = btoa(String.fromCharCode(...new Uint8Array(buffer)));

      if (conn && conn.open) {
        conn.send({ type: 'audio', data: base64 });
        dbg('Audio sent (' + base64.length + ' chars)');
        statusEl.textContent = 'Audio sent to speaker...';
      } else {
        dbg('Not connected!');
        statusEl.textContent = 'Not connected to speaker!';
      }

      btn.classList.remove('processing');
      updateButtonState();
    }

    // === BUTTON EVENTS ===
    let touchActive = false;

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touchActive = true;
      startRecording();
    }, { passive: false });

    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      touchActive = false;
      stopRecording();
    }, { passive: false });

    btn.addEventListener('touchcancel', (e) => {
      touchActive = false;
      stopRecording();
    });

    btn.addEventListener('mousedown', (e) => {
      if (!touchActive) { e.preventDefault(); startRecording(); }
    });

    btn.addEventListener('mouseup', (e) => {
      if (!touchActive) { e.preventDefault(); stopRecording(); }
    });

    // === INIT ===
    setupMic();
    setupPeer();
  </script>
</body>
</html>
