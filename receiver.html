<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HK AI</title>
</head>
<body>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    // === CONFIG ===
    // API key is set via URL hash: receiver.html#ROOM_ID:API_KEY
    const hashParts = location.hash.slice(1).split(':');
    const ROOM_ID = hashParts[0] || 'default';
    const API_KEY = hashParts.slice(1).join(':') || '';

    const SPEAKER_PEER_ID = 'hk-spk-' + ROOM_ID;
    const MIC_PEER_ID = 'hk-mic-' + ROOM_ID;

    let conn = null;

    // === PEERJS SETUP ===
    const peer = new Peer(SPEAKER_PEER_ID, { debug: 0 });

    peer.on('open', () => {
      document.title = 'HK:ready:' + ROOM_ID;
      log('Speaker peer ready: ' + SPEAKER_PEER_ID);
      connectToMic();
    });

    peer.on('connection', (incoming) => {
      log('Mic connected (incoming)');
      setupConnection(incoming);
    });

    function connectToMic() {
      const c = peer.connect(MIC_PEER_ID, { reliable: true });
      c.on('open', () => {
        log('Connected to mic (outgoing)');
        setupConnection(c);
      });
      c.on('error', () => {
        log('Mic not found, waiting for incoming...');
      });
    }

    function setupConnection(c) {
      conn = c;
      conn.on('data', async (data) => {
        if (data.type === 'audio') {
          await handleAudio(data.data, data.format);
        }
      });
      conn.on('close', () => {
        log('Mic disconnected');
        conn = null;
      });
      sendToMic({ type: 'status', text: 'Connected! Hold button to talk.' });
    }

    function sendToMic(data) {
      if (conn && conn.open) conn.send(data);
    }

    function log(msg) {
      console.log('[HK]', msg);
    }

    // === AUDIO PROCESSING ===
    async function handleAudio(base64Audio, format) {
      sendToMic({ type: 'status', text: 'Transcribing...' });
      document.title = 'HK:transcribing';

      try {
        // 1. Convert base64 to blob
        const binaryStr = atob(base64Audio);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
        const audioBlob = new Blob([bytes], { type: 'audio/webm;codecs=opus' });

        // 2. Transcribe with Whisper API (via proxy or direct)
        const transcript = await transcribeAudio(audioBlob);
        if (!transcript) {
          sendToMic({ type: 'status', text: 'Could not transcribe audio.' });
          return;
        }

        log('Transcript: ' + transcript);
        sendToMic({ type: 'transcript', text: transcript });
        sendToMic({ type: 'status', text: 'Thinking...' });
        document.title = 'HK:thinking';

        // 3. Send to Claude
        const response = await askClaude(transcript);
        log('Claude: ' + response);
        sendToMic({ type: 'response', text: response.slice(0, 200) });
        sendToMic({ type: 'status', text: 'Speaking...' });
        document.title = 'HK:speaking';

        // 4. TTS and play
        await speakResponse(response);

        sendToMic({ type: 'status', text: 'Ready. Hold button to talk.' });
        document.title = 'HK:ready';

      } catch (err) {
        log('Error: ' + err.message);
        sendToMic({ type: 'status', text: 'Error: ' + err.message });
        document.title = 'HK:error';
      }
    }

    // === STT: Use Groq Whisper (free tier) or OpenAI Whisper ===
    async function transcribeAudio(audioBlob) {
      // Option 1: Use Groq's free Whisper API
      // Option 2: Use OpenAI Whisper
      // For now, use a simple approach: Google Speech Recognition via Web Speech API
      // Since Web Speech is not available on CrKey, we'll use Groq

      if (!API_KEY) {
        // Fallback: use a simple keyword detection or skip STT
        log('No API key, cannot transcribe');
        sendToMic({ type: 'status', text: 'No API key configured!' });
        return null;
      }

      // Try Anthropic's approach: send audio as base64 in the Claude message
      // Claude can't process audio directly, so we need a separate STT service
      // Use Groq's free Whisper API as STT
      try {
        const formData = new FormData();
        formData.append('file', audioBlob, 'audio.webm');
        formData.append('model', 'whisper-large-v3');
        formData.append('response_format', 'text');
        formData.append('language', 'fr');

        const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + API_KEY.split(',')[1] },
          body: formData
        });

        if (!r.ok) {
          const err = await r.text();
          log('Groq STT error: ' + err);
          // Fallback: try OpenAI-compatible endpoint
          return null;
        }

        return (await r.text()).trim();
      } catch (e) {
        log('STT error: ' + e.message);
        return null;
      }
    }

    // === CLAUDE API ===
    const conversationHistory = [];

    async function askClaude(userMessage) {
      conversationHistory.push({ role: 'user', content: userMessage });

      // Keep last 10 messages for context
      if (conversationHistory.length > 20) {
        conversationHistory.splice(0, conversationHistory.length - 20);
      }

      const anthropicKey = API_KEY.split(',')[0];

      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: "Tu es un assistant vocal intelligent qui parle à travers un speaker Harman Kardon Citation 1000 dans le bureau de KoinKoin Office à Cotonou, Bénin. Tu réponds de manière concise et naturelle, en français. Tes réponses seront lues à voix haute, donc garde-les courtes (2-3 phrases max).",
          messages: conversationHistory
        })
      });

      if (!r.ok) {
        const err = await r.text();
        throw new Error('Claude API: ' + r.status + ' ' + err.slice(0, 200));
      }

      const data = await r.json();
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      return reply;
    }

    // === TTS: Google Translate TTS ===
    async function speakResponse(text) {
      // Split long text into chunks (Google TTS limit ~200 chars)
      const chunks = splitText(text, 190);

      for (const chunk of chunks) {
        await playTTSChunk(chunk);
      }
    }

    function splitText(text, maxLen) {
      const chunks = [];
      let remaining = text;
      while (remaining.length > 0) {
        if (remaining.length <= maxLen) {
          chunks.push(remaining);
          break;
        }
        // Find last sentence break before maxLen
        let splitAt = remaining.lastIndexOf('. ', maxLen);
        if (splitAt === -1 || splitAt < maxLen / 2) {
          splitAt = remaining.lastIndexOf(' ', maxLen);
        }
        if (splitAt === -1) splitAt = maxLen;
        chunks.push(remaining.slice(0, splitAt + 1).trim());
        remaining = remaining.slice(splitAt + 1).trim();
      }
      return chunks;
    }

    function playTTSChunk(text) {
      return new Promise((resolve, reject) => {
        const encoded = encodeURIComponent(text);
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=fr&q=${encoded}`;

        const audio = new Audio(url);
        audio.onended = resolve;
        audio.onerror = (e) => {
          log('TTS playback error, trying fallback');
          // Fallback: use SpeechSynthesis if available
          if (window.speechSynthesis) {
            const utt = new SpeechSynthesisUtterance(text);
            utt.lang = 'fr-FR';
            utt.onend = resolve;
            utt.onerror = resolve;
            speechSynthesis.speak(utt);
          } else {
            resolve();
          }
        };
        audio.play().catch(() => resolve());
      });
    }

    // === NOTIFY RESULTS ===
    // Also send startup info to ntfy for debugging
    fetch('https://ntfy.sh/hk-cast-diag-x7k9m2', {
      method: 'POST',
      body: JSON.stringify({
        event: 'receiver_start',
        room: ROOM_ID,
        hasKey: !!API_KEY,
        ua: navigator.userAgent,
        ts: Date.now()
      })
    }).catch(() => {});
  </script>
</body>
</html>
