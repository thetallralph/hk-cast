<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HK Diag</title>
</head>
<body>
  <script>
    // All diagnostic results collected here
    const results = [];
    function log(msg) {
      results.push(msg);
      document.title = 'HK:' + results.length;
    }

    // Send results back to us via ntfy.sh
    const TOPIC = 'hk-cast-diag-x7k9m2';

    async function sendResults() {
      try {
        await fetch(`https://ntfy.sh/${TOPIC}`, {
          method: 'POST',
          body: JSON.stringify({ results, ts: Date.now() }),
          headers: { 'Content-Type': 'application/json' }
        });
      } catch (e) {
        // fallback: encode in title
        document.title = 'ERR:' + e.message;
      }
    }

    async function runDiagnostics() {
      log('DIAG_START');
      log('UA:' + navigator.userAgent);
      log('Platform:' + navigator.platform);

      // 1. getUserMedia support
      const hasGUM = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
      log('getUserMedia:' + hasGUM);

      // 2. enumerateDevices
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        log('devices_total:' + devices.length);
        devices.forEach((d, i) => {
          log(`dev${i}:${d.kind}|${d.label || 'nolabel'}|${d.deviceId.slice(0, 12)}`);
        });
        const mics = devices.filter(d => d.kind === 'audioinput');
        log('mic_count:' + mics.length);
      } catch (e) {
        log('enumerateDevices_err:' + e.name + ':' + e.message);
      }

      // 3. Try microphone access
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        log('MIC_ACCESS:GRANTED');
        const tracks = stream.getAudioTracks();
        tracks.forEach((t, i) => {
          const s = t.getSettings();
          log(`track${i}:${t.label}|sr=${s.sampleRate}|ch=${s.channelCount}|enabled=${t.enabled}`);
        });

        // Audio level test (3 seconds)
        const ctx = new AudioContext();
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);

        let maxLvl = 0;
        await new Promise(resolve => {
          let count = 0;
          const iv = setInterval(() => {
            analyser.getByteFrequencyData(data);
            const avg = data.reduce((a, b) => a + b, 0) / data.length;
            if (avg > maxLvl) maxLvl = avg;
            log(`audio_lvl:${avg.toFixed(1)}`);
            if (++count >= 6) { clearInterval(iv); resolve(); }
          }, 500);
        });

        stream.getTracks().forEach(t => t.stop());
        ctx.close();
        log('mic_max_level:' + maxLvl.toFixed(1));
        log('MIC_WORKING:' + (maxLvl > 5));
      } catch (e) {
        log('MIC_ACCESS:DENIED:' + e.name + ':' + e.message);
      }

      // 4. Network tests
      try {
        await fetch('https://api.anthropic.com/', { method: 'HEAD', mode: 'no-cors' });
        log('net_anthropic:OK');
      } catch (e) {
        log('net_anthropic:FAIL:' + e.message);
      }

      try {
        await fetch('https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=test', { mode: 'no-cors' });
        log('net_google_tts:OK');
      } catch (e) {
        log('net_google_tts:FAIL:' + e.message);
      }

      // 5. Audio output test (beep)
      try {
        const ctx2 = new AudioContext();
        const osc = ctx2.createOscillator();
        const gain = ctx2.createGain();
        osc.connect(gain);
        gain.connect(ctx2.destination);
        gain.gain.value = 0.05;
        osc.frequency.value = 440;
        osc.start();
        await new Promise(r => setTimeout(r, 1000));
        osc.stop();
        ctx2.close();
        log('audio_output:OK');
      } catch (e) {
        log('audio_output:FAIL:' + e.message);
      }

      // 6. WebSocket test
      try {
        const ws = new WebSocket('wss://echo.websocket.org');
        await new Promise((resolve, reject) => {
          ws.onopen = () => { log('websocket:OK'); ws.close(); resolve(); };
          ws.onerror = () => { log('websocket:FAIL'); reject(); };
          setTimeout(() => { log('websocket:TIMEOUT'); reject(); }, 5000);
        });
      } catch (e) {
        // already logged
      }

      log('DIAG_COMPLETE');
      document.title = 'DONE:' + results.length + ' items';

      // Send all results
      await sendResults();
    }

    // DashCast loads us in an iframe — just run diagnostics immediately
    window.addEventListener('load', () => {
      // Small delay to ensure everything is ready
      setTimeout(runDiagnostics, 1000);
    });
  </script>
</body>
</html>
