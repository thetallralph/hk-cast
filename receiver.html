<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HK Diag v2</title>
</head>
<body>
  <script>
    const results = [];
    const TOPIC = 'hk-cast-diag-x7k9m2';

    function log(msg) { results.push(msg); }

    async function sendResults() {
      try {
        await fetch(`https://ntfy.sh/${TOPIC}`, {
          method: 'POST',
          body: JSON.stringify({ v: 2, results, ts: Date.now() }),
          headers: { 'Content-Type': 'application/json' }
        });
        document.title = 'SENT:' + results.length;
      } catch (e) {
        document.title = 'ERR:' + e.message;
      }
    }

    async function run() {
      log('DIAG_V2_START');
      log('UA:' + navigator.userAgent);

      // Chrome version and features
      log('chrome_ver:' + (/Chrome\/(\d+)/.exec(navigator.userAgent) || ['','?'])[1]);

      // 1. Detailed mediaDevices check
      log('mediaDevices:' + !!navigator.mediaDevices);
      log('getUserMedia:' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
      log('enumerateDevices:' + !!(navigator.mediaDevices && navigator.mediaDevices.enumerateDevices));

      // Older getUserMedia APIs
      log('webkitGetUserMedia:' + !!navigator.webkitGetUserMedia);
      log('mozGetUserMedia:' + !!navigator.mozGetUserMedia);

      // 2. Enumerate ALL devices with details
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        devices.forEach((d, i) => {
          log(`device:${i}|${d.kind}|${d.label}|${d.deviceId}|${d.groupId}`);
        });
      } catch (e) {
        log('enum_err:' + e.name + ':' + e.message);
      }

      // 3. Try getUserMedia with different constraints
      const attempts = [
        { audio: true },
        { audio: {} },
        { audio: { deviceId: 'default' } },
        { audio: { echoCancellation: false } },
        { audio: { sampleRate: 16000 } },
        { audio: { channelCount: 1 } },
      ];

      for (let i = 0; i < attempts.length; i++) {
        try {
          const s = await navigator.mediaDevices.getUserMedia(attempts[i]);
          log(`gum_attempt${i}:SUCCESS`);
          s.getTracks().forEach(t => {
            log(`gum${i}_track:${t.kind}|${t.label}|${JSON.stringify(t.getSettings())}`);
            t.stop();
          });
          break; // Stop on first success
        } catch (e) {
          log(`gum_attempt${i}:${e.name}:${e.message}`);
        }
      }

      // 4. Try legacy getUserMedia
      try {
        if (navigator.webkitGetUserMedia) {
          await new Promise((resolve, reject) => {
            navigator.webkitGetUserMedia({ audio: true },
              (s) => { log('webkit_gum:SUCCESS'); s.getTracks().forEach(t => t.stop()); resolve(); },
              (e) => { log('webkit_gum:' + e.name + ':' + e.message); resolve(); }
            );
          });
        }
      } catch (e) {
        log('webkit_gum_err:' + e.message);
      }

      // 5. Check Web Speech API (speech recognition)
      log('SpeechRecognition:' + !!(window.SpeechRecognition || window.webkitSpeechRecognition));
      if (window.SpeechRecognition || window.webkitSpeechRecognition) {
        try {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SR();
          recognition.lang = 'en-US';
          recognition.continuous = false;
          recognition.interimResults = false;

          await new Promise((resolve) => {
            recognition.onresult = (e) => {
              log('speech_result:' + e.results[0][0].transcript);
              resolve();
            };
            recognition.onerror = (e) => {
              log('speech_err:' + e.error + ':' + e.message);
              resolve();
            };
            recognition.onend = () => resolve();
            recognition.start();
            setTimeout(() => { try { recognition.stop(); } catch(e){} resolve(); }, 5000);
          });
        } catch (e) {
          log('speech_api_err:' + e.name + ':' + e.message);
        }
      }

      // 6. Check AudioWorklet support
      try {
        const ctx = new AudioContext();
        log('audioContext:OK|sr=' + ctx.sampleRate + '|state=' + ctx.state);
        log('audioWorklet:' + !!ctx.audioWorklet);

        // Check audio destination details
        log('audio_dest:channels=' + ctx.destination.maxChannelCount);

        // Try createMediaStreamDestination
        try {
          const dest = ctx.createMediaStreamDestination();
          log('mediaStreamDest:OK');
        } catch(e) {
          log('mediaStreamDest:' + e.message);
        }

        ctx.close();
      } catch (e) {
        log('audioCtx_err:' + e.message);
      }

      // 7. Check permissions API
      try {
        const micPerm = await navigator.permissions.query({ name: 'microphone' });
        log('mic_permission:' + micPerm.state);
      } catch (e) {
        log('mic_permission_err:' + e.name + ':' + e.message);
      }

      // 8. Check Bluetooth API
      log('bluetooth_api:' + !!navigator.bluetooth);
      if (navigator.bluetooth) {
        try {
          const avail = await navigator.bluetooth.getAvailability();
          log('bluetooth_avail:' + avail);
        } catch (e) {
          log('bluetooth_err:' + e.message);
        }
      }

      // 9. Check USB API (WebUSB)
      log('usb_api:' + !!navigator.usb);
      if (navigator.usb) {
        try {
          const devices = await navigator.usb.getDevices();
          log('usb_devices:' + devices.length);
        } catch (e) {
          log('usb_err:' + e.message);
        }
      }

      // 10. Check if we're in secure context
      log('isSecureContext:' + window.isSecureContext);
      log('protocol:' + window.location.protocol);

      log('DIAG_V2_COMPLETE');
      await sendResults();
    }

    window.addEventListener('load', () => setTimeout(run, 1500));
  </script>
</body>
</html>
