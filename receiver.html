<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HK AI</title>
</head>
<body>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    // === CONFIG ===
    // Hash format: #ROOM_ID:GROQ_KEY
    const hashParts = location.hash.slice(1).split(':');
    const ROOM_ID = hashParts[0] || 'hk1000';
    const GROQ_KEY = hashParts.slice(1).join(':') || '';
    const LLM_MODEL = 'llama-3.3-70b-versatile';

    const SPEAKER_PEER_ID = 'hk-spk-' + ROOM_ID;
    const MIC_PEER_ID = 'hk-mic-' + ROOM_ID;

    let conn = null;
    const NTFY = 'hk-cast-diag-x7k9m2';

    function dbg(msg) {
      document.title = 'HK:' + msg.slice(0, 30);
      fetch('https://ntfy.sh/' + NTFY, {
        method: 'POST',
        body: JSON.stringify({ src: 'receiver', msg, ts: Date.now() })
      }).catch(() => {});
    }

    dbg('init:room=' + ROOM_ID + ',key=' + (GROQ_KEY ? 'yes(' + GROQ_KEY.length + ')' : 'NONE'));

    // === PEERJS SETUP ===
    const peer = new Peer(SPEAKER_PEER_ID, { debug: 0 });

    peer.on('open', (id) => {
      dbg('peer_open:' + id);
      connectToMic();
    });

    peer.on('error', (err) => {
      dbg('peer_error:' + err.type + ':' + err.message);
    });

    peer.on('connection', (incoming) => {
      dbg('incoming_connection');
      setupConnection(incoming);
    });

    function connectToMic() {
      dbg('connecting_to_mic:' + MIC_PEER_ID);
      const c = peer.connect(MIC_PEER_ID, { reliable: true });
      c.on('open', () => {
        dbg('connected_to_mic');
        setupConnection(c);
      });
      c.on('error', (e) => {
        dbg('mic_connect_err:' + e);
      });
    }

    function setupConnection(c) {
      conn = c;
      dbg('data_channel_open');
      conn.on('data', async (data) => {
        dbg('data_received:type=' + data.type + ',size=' + (data.data ? data.data.length : 0));
        if (data.type === 'audio') {
          await handleAudio(data.data);
        }
      });
      conn.on('close', () => { conn = null; dbg('conn_closed'); });
      sendToMic({ type: 'status', text: 'Connected! Hold button to talk.' });
    }

    function sendToMic(data) {
      if (conn && conn.open) conn.send(data);
    }

    // === AUDIO PROCESSING ===
    async function handleAudio(base64Audio) {
      sendToMic({ type: 'status', text: 'Transcribing...' });

      try {
        dbg('step1:decoding_base64:' + base64Audio.length);
        const bin = atob(base64Audio);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const audioBlob = new Blob([bytes], { type: 'audio/webm;codecs=opus' });
        dbg('step2:blob_created:' + audioBlob.size + 'bytes');

        dbg('step3:calling_whisper');
        const transcript = await transcribe(audioBlob);
        dbg('step4:transcript=' + (transcript || 'EMPTY'));
        if (!transcript) {
          sendToMic({ type: 'status', text: 'Could not hear you. Try again.' });
          return;
        }

        sendToMic({ type: 'transcript', text: transcript });
        sendToMic({ type: 'status', text: 'Thinking...' });

        dbg('step5:calling_llm');
        const response = await chat(transcript);
        dbg('step6:response=' + response.slice(0, 80));
        sendToMic({ type: 'response', text: response.slice(0, 200) });
        sendToMic({ type: 'status', text: 'Speaking...' });

        dbg('step7:playing_tts');
        await speak(response);
        dbg('step8:done');

        sendToMic({ type: 'status', text: 'Ready. Hold button to talk.' });

      } catch (err) {
        dbg('ERROR:' + err.name + ':' + err.message);
        sendToMic({ type: 'status', text: 'Error: ' + err.message });
      }
    }

    // === STT: Groq Whisper ===
    async function transcribe(audioBlob) {
      const form = new FormData();
      form.append('file', audioBlob, 'audio.webm');
      form.append('model', 'whisper-large-v3');
      form.append('response_format', 'text');
      form.append('language', 'fr');

      const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + GROQ_KEY },
        body: form
      });

      if (!r.ok) {
        const err = await r.text();
        throw new Error('STT: ' + r.status + ' ' + err.slice(0, 100));
      }

      return (await r.text()).trim();
    }

    // === LLM: Groq Llama ===
    const history = [];

    async function chat(userMsg) {
      history.push({ role: 'user', content: userMsg });
      if (history.length > 20) history.splice(0, history.length - 20);

      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GROQ_KEY
        },
        body: JSON.stringify({
          model: LLM_MODEL,
          max_tokens: 300,
          messages: [
            {
              role: 'system',
              content: "Tu es un assistant vocal intelligent qui parle à travers un speaker Harman Kardon Citation 1000 dans le bureau de KoinKoin Office à Cotonou, Bénin. Tu réponds de manière concise et naturelle, en français. Tes réponses seront lues à voix haute, donc garde-les courtes (2-3 phrases max). Tu es amical et utile."
            },
            ...history
          ]
        })
      });

      if (!r.ok) {
        const err = await r.text();
        throw new Error('LLM: ' + r.status + ' ' + err.slice(0, 100));
      }

      const data = await r.json();
      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });
      return reply;
    }

    // === TTS: Google Translate ===
    async function speak(text) {
      const chunks = splitText(text, 190);
      for (const chunk of chunks) {
        await playChunk(chunk);
      }
    }

    function splitText(text, max) {
      const parts = [];
      let rest = text;
      while (rest.length > 0) {
        if (rest.length <= max) { parts.push(rest); break; }
        let i = rest.lastIndexOf('. ', max);
        if (i < max / 2) i = rest.lastIndexOf(' ', max);
        if (i < 0) i = max;
        parts.push(rest.slice(0, i + 1).trim());
        rest = rest.slice(i + 1).trim();
      }
      return parts;
    }

    function playChunk(text) {
      return new Promise((resolve) => {
        const url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=fr&q=' + encodeURIComponent(text);
        const audio = new Audio(url);
        audio.onended = resolve;
        audio.onerror = () => resolve();
        audio.play().catch(() => resolve());
      });
    }
  </script>
</body>
</html>
